name: Bug report
description: Report a reproducible failure in the DeepAgents video-maker repo.
title: "bug: "
labels: ["type: bug", "status: triage"]
assignees:
  - AILatentspace1
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please keep logs and commands exact.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Exact commands, inputs, and environment variables used.
      placeholder: |
        uv run pytest tests/deepagents_video_maker -q
        uv run python scripts/deepagents_video_maker.py --check
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / logs
      render: shell
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      value: |
        - [ ] Root cause identified.
        - [ ] Regression test added or updated.
        - [ ] `uv run pytest tests/deepagents_video_maker -q` passes.
