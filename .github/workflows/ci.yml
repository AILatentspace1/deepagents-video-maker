name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: pip install uv

      - name: Install Python dependencies
        run: uv sync

      - name: Run test suite
        run: uv run pytest tests/deepagents_video_maker -q

      - name: CLI sanity check
        run: uv run python scripts/deepagents_video_maker.py --check
