name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync

      - name: Run test suite
        run: uv run pytest tests/deepagents_video_maker -q

      - name: CLI sanity check
        run: uv run python scripts/deepagents_video_maker.py --check
