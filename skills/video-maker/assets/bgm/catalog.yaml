# BGM Catalog — royalty-free tracks for video-maker
# Actual .mp3 files are NOT bundled in the repo.
# 首次使用前需手动放置 .mp3 文件到 skills/video-maker/assets/bgm/ 目录。
# 推荐免版权音源站：
#   - https://pixabay.com/music/ (免费，无需署名)
#   - https://freesound.org/ (CC0/CC-BY)
#   - https://uppbeat.io/ (免费版可商用)
# 文件名必须与下方 file 字段一致，如 upbeat-tech.mp3。
# Sound Engineer 在文件不存在时会跳过 BGM 处理（静默降级）。

tracks:
  - id: upbeat-tech
    file: upbeat-tech.mp3
    description: "Upbeat electronic, good for AI/tech/data topics"
    duration_seconds: 120
    loop: true
    bpm: 128
    mood: [energetic, optimistic, tech]
    style_match: [professional, casual]

