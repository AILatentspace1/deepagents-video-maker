# Minimal better-harness config for video-maker scriptwriter optimization
#
# This config exposes only the scriptwriter prompt for autonomous optimization.
# The outer Deep Agent will read eval failures and propose edits to improve
# script generation quality.

[experiment]
name = "video-maker-scriptwriter-minimal"
runner = "pytest"
workspace_root = "."
# GLM-4.5-Air is a weaker model (ZhipuAI haiku-tier) that struggles with strict
# structural requirements — this is intentional: it causes tests to fail so that
# better-harness has something to optimize.
model = "GLM-4.5-Air"
max_iterations = 5

[better_agent]
# The optimizer itself uses the stronger model (claude-sonnet-4-6 / glm-5-turbo)
model = "claude-sonnet-4-6"
max_turns = 30

[runner.pytest]
project_root = ".."
uv_group = "dev"
model_flag = "--model"
summary_flag = "--evals-report-file"
pytest_args = ["-q"]

# Single surface: scriptwriter prompt
# The outer agent can edit this file to improve script generation
[surfaces.scriptwriter_prompt]
kind = "workspace_file"
target = "../skills/video-maker/agents/scriptwriter.md"
filename = "scriptwriter.md"
base_file = "../skills/video-maker/agents/scriptwriter.md"

# Train cases: LLM-based — these actually invoke the model and measure output quality
[[cases]]
case_id = "tests/evals/test_script_llm_train.py::test_llm_scriptwriter_passes_ratify"
split = "train"
stratum = "structure"

[[cases]]
case_id = "tests/evals/test_script_llm_train.py::test_llm_scriptwriter_narrative_arc"
split = "train"
stratum = "scene_quality"

[[cases]]
case_id = "tests/evals/test_script_llm_train.py::test_llm_scriptwriter_style_spine"
split = "train"
stratum = "structure"

# Holdout cases: different domains and edge cases to prevent overfitting
[[cases]]
case_id = "tests/evals/test_script_llm_holdout.py::test_llm_scriptwriter_data_card_quality"
split = "holdout"
stratum = "structure"

[[cases]]
case_id = "tests/evals/test_script_llm_holdout.py::test_llm_scriptwriter_duration_compliance"
split = "holdout"
stratum = "scene_quality"

# Stress cases: edge scenarios that expose prompt fragility
[[cases]]
case_id = "tests/evals/test_script_llm_stress.py::test_llm_scriptwriter_ultra_short"
split = "train"
stratum = "duration"

[[cases]]
case_id = "tests/evals/test_script_llm_stress.py::test_llm_scriptwriter_pure_narrative"
split = "train"
stratum = "content_type"

[[cases]]
case_id = "tests/evals/test_script_llm_stress.py::test_llm_scriptwriter_zh_en_mix"
split = "holdout"
stratum = "locale"
